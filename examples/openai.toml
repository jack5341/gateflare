name               = "gateflare"
main               = "src/index.ts"
compatibility_date = "2026-03-20"

[vars]
GATEWAY_CONFIG = """
{
  "log_level": "info",
  "rate_limit": {
    "enabled": true,
    "requests": 60,
    "window_seconds": 60,
    "by": "ip"
  },
  "cors": {
    "enabled": true,
    "origin": "*"
  },
  "routes": [
    {
      "path": "/openai/*",
      "upstream": "https://api.openai.com",
      "secret_ref": "OPENAI_API_KEY",
      "auth_style": "bearer",
      "rewrite": { "strip_prefix": "/openai" },
      "headers": {
        "strip": ["origin", "referer", "cf-connecting-ip"],
        "inject": { "openai-beta": "assistants=v2" }
      }
    }
  ]
}
"""
